# ==================== 公共配置（所有环境共享） ====================
spring:
  application:
    name: cat
  # Maven profile 控制激活哪个环境
  # 打包时：mvn package -P dev  或  mvn package -P prod
  # IDEA 里：Maven 面板勾选对应 profile
  profiles:
    active: @spring.profiles.active@

# JWT 和微信密钥仍从环境变量取（不写死在 yml 里，不进 git）
jwt:
  secret: ${JWT_SECRET}

wx:
  appId: ${WX_APPID}
  appSecret: ${WX_SECRET}
